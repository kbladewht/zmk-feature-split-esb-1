description: |
  Shared ESB link identity for a ZMK ESB split.
  The central and every peripheral must declare identical values to pair.
  Place this node in a dtsi included by the central and every peripheral.

compatible: "zmk,split-esb"

properties:
  base-address:
    type: uint8-array
    required: true
    description: 4-byte ESB base address, shared by all pipes.
  address-length:
    type: int
    default: 5
    enum: [3, 4, 5]
    description: |
      On-air address bytes (1 prefix plus base). 5 is standard ESB. Shorter trims a
      byte per packet but weakens address selectivity. Uses the high base-address
      bytes. All peripherals must match the central.
  hop-channels:
    type: uint8-array
    required: true
    description: |
      RF channels, each 0-100 (2400 + N MHz).
      One channel means fixed operation.
      Two or more hop between channels in list order.
  hop-threshold:
    type: int
    default: 6
    description: |
      Graded loss before acting; a fully-lost window scores 4, so the default needs
      two bad windows. Central: weighted link-loss sum across peripherals that
      triggers a coordinated hop. Peripheral: sweep trigger for the failed-window streak.
  hop-window-ms:
    type: int
    default: 32
    description: Peripheral keepalive period while data is flowing.
  rssi-floor-dbm:
    type: int
    default: -85
    description: |
      Central hop trigger. A served peripheral whose motion arrives weaker than this (dBm)
      counts the window as degraded, so the link hops toward a better-propagating channel.
      Set near where the link actually fails, or it hops chasing a merely-distant peer.
  idle-keepalive-ms:
    type: int
    default: 128
    description: |
      Peripheral keepalive period when no data is flowing. Also the central's hop-decision
      window period.
  tx-power-dbm:
    type: int
    default: 0
    description: Boot TX output power, dBm. Radio rounds to nearest supported level.
  retransmit-count:
    type: int
    default: 3
    description: Hardware retransmit attempts before an unacked packet is dropped.
  retransmit-delay-us:
    type: int
    default: 600
    description: Delay between retransmits, microseconds.
  use-fast-ramp-up:
    type: boolean
    description: |
      Shorter radio TX/RX ramp-up delay.
      nRF52/nRF53 only.
      All peripherals must match the central.
  crc-bits:
    type: int
    default: 16
    enum: [0, 8, 16]
    description: CRC width in bits (0 disables CRC). All peripherals must match the central.
  bitrate-kbps:
    type: int
    default: 2000
    enum: [1000, 2000]
    description: Radio bitrate in kbps. All peripherals must match the central.
  lossy-codes:
    type: array
    description: |
      Input axes the peripheral sends without ACK.
      Each entry is two cells, an INPUT_EV_* type and its INPUT_*_<NAME> code,
      e.g. <INPUT_EV_REL INPUT_REL_X>, <INPUT_EV_REL INPUT_REL_Y>.
      Reserve for high-rate, self-correcting axes (pointer motion).
      Non-input split events (key-position, sensor, battery) are always ACK'd, and
      every other input event is ACK'd unless listed.
      Omit for fully lossless link.

child-binding:
  description: Peripheral table container.
  child-binding:
    description: One ESB peripheral.
    properties:
      pipe:
        type: int
        required: true
        description: ESB pipe index, also the ZMK source id.
      prefix:
        type: int
        required: true
        description: 1-byte address prefix for this pipe.
      weight:
        type: int
        default: 1
        description: Relative priority for airtime throttling and hop vote.
